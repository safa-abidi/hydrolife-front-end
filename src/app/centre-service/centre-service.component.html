<app-navbar>
<app-dash-nav></app-dash-nav>
<br>
<div class="container">
  <div>
    <button class="button my-5" routerLink="/AjouterService/{{ id }}"><span>Nouveau service </span></button>
<div *ngIf="info?.length == 0">
  <br><br><br><br>
  <div  class="alert alert-warning"> <p> Vous n'avez aucun service </p></div> <br><br><br></div>
  <div class="card mb-3" *ngFor="let service of userService.listData; let i = index">
    <div class="row no-gutters">
      <div class="col" >
        <img style="width: 80%;" src = "{{this.userService.host+'/api/service/get/'+ service.id_service +'/bycentre/' +service.idCentre}}">		
      </div>
      <div class="col">
        <div class="card-body">
          <div class="">
          <h2 class=""> Titre du service :</h2>
          <h3 class="card-title mt-1">  {{ service?.libelle_service }} </h3>
          </div>
            <h4 class="card-text "> {{ service?.description_service }} </h4>
          <p class="card-text"></p>
          <p class="card-text">
          <p>Prix : {{ service?.prix_service }} TND / personne</p>

        </div>
      </div>
      <button class="buttonProm " routerLink="/AjouterPromotionSer/{{ service.id_service }}">Ajouter promotion
        <span> <i class="fa fa-edit fa-lg fa-fw" aria-hidden="true"></i> </span></button>
      <button class="buttonSup " (click)="delete(service)">Supprimer <span> <i><img src="assets/trash.png" class="trash"></i> </span></button>
      <button class="buttonMod " routerLink="/UpdateService/{{ service.id_service }}">Modifier
        <span> <i class="fa fa-edit fa-lg fa-fw" aria-hidden="true"></i> </span></button>
    </div>
  </div>
  <button *ngIf="info?.length > 5" class="button my-5" routerLink="/AjouterService/{{ id }}"><span>Nouveau service </span></button>
</div>
</div>
<br>
</app-navbar>

<img src="assets/spacer.jpg">
<div class=" emp-profile">
    <div class="row">

        <div class="col-md-6">
            <div class="profile-head">
                <h1>
                    {{ info?.nom }} {{ info?.prenom }}
                </h1>

            </div>
        </div>
        <div class="col-md-2" >
            <button class="text-white button " mat-dialog-close routerLink="/UpdateClientProfil/{{info?.id}}">Modifier votre profil
                <span> <i class="fa fa-edit fa-lg fa-fw" aria-hidden="true"></i> </span></button>

        </div>
    </div>
    <div class="row">

        <div class="col-md-8">
            <div class="tab-content profile-tab" id="myTabContent">
                <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
                    <div class="row">
                        <div class="col-md-6">
                            <i class="fa fa-user fa-lg px-2" style="color: #D88C8A;"></i>
                            <label>Nom et prénom</label>
                        </div>
                        <div class="col-md-6">
                            <p> {{ info?.nom }} {{ info?.prenom }} </p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <i class="fa fa-envelope fa-lg px-2" style="color: #D88C8A;"></i>

                            <label>Email</label>
                        </div>
                        <div class="col-md-6">
                            <p> {{ info?.email }} </p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <i class="fa fa-phone-square fa-lg px-2" style="color: #D88C8A;"></i>
                            <label>Num de tél</label>
                        </div>
                        <div class="col-md-6">
                            <p>{{ info?.tel }}</p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <i class="fa fa-map-marker fa-lg px-2" style="color: #D88C8A;"></i>
                            <label>Adresse</label>
                        </div>
                        <div class="col-md-6">
                            <p>{{ info?.adresse }}</p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <i class="fa fa-calendar fa-lg px-2" style="color: #D88C8A;"></i>
                            <label>Date de naissance</label>
                        </div>
                        <div class="col-md-6">
                            <p>{{ info?.dateNaissance| date:'shortDate' | date:'dd-MM-yyyy' }}</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

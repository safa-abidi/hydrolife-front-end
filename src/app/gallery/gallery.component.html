<form [formGroup]="this.crudApi.dataForm" (ngSubmit)="onSubmit()">
    <input type="hidden"  formControlName="id" id="id">

    <div class="form-group">
      <label>Titre photo </label>
      <input type="text" class="form-control" formControlName="titre_photo" id="titre_photo" name="titre_photo">
    </div>

    <div class="form-group">
      <label>description photo  </label>
      <input type="text" class="form-control" formControlName="description" id="description" name="description">
    </div>




    <div class="form-group">
        <label>File Upload  </label>
            <input type="file" accept="image/*" (change)="onSelectFile($event)">
    </div>
    <div class="form-group">
      <button type="submit" class="btn btn-dark"><i class="fa fa-database"></i> Submit</button>
    </div>
  </form>

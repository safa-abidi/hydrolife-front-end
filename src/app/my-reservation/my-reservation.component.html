<app-navbar>
    <div *ngIf="info?.length == 0">
    <div  class="alert alert-warning"> <p> Vous n'avez aucun info </p></div> <br><br><br></div>
    <div>
    <div class="card mb-3" *ngFor="let ress of info" >
      <div class="row no-gutters"  >
        <div class="col">
          <div class="card-body">
            <div class="row">
            <h2 class="ml-2"> Titre du info :</h2>
            <h3 class="card-title mt-1 ml-1">  {{ ress?.idService }} </h3>
            </div>
              <h4 class="card-text "> {{ ress?.nbre_personnes_res }} </h4>
              <h4 class="card-text" > {{ ress?.date_debut_res  | date:'shortDate'| date:'dd-MM-yyyy' }} </h4>
            <p class="card-text"></p>
            <p class="card-text">
            <p>Prix : {{ ress?.montant }} TND</p>
  
          </div>
        </div>
      </div>
    </div></div>
</app-navbar>
